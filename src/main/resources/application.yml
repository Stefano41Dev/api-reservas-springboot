spring:
  sql:
    init:
      mode: always
  application:
    name: API-Reservas

  datasource:

    url: jdbc:mysql://localhost:3306/bd_reservas_hotel?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: stefano

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${CORREO_JMAIL}
    password: ${PASSWD_JMAIL}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000
  refrestToken: 86400000

jsonpe:
  bearerToken: ${TOKEN_JSONPE}
