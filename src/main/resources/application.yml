spring:
  sql:
    init:
      mode: always
  application:
    name: API-Reservas

  datasource:
    url: jdbc:mysql://mysql:3306/bd_reservas_hotel?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: UnaClaveSecretaLargaYSeguraParaFirmarElTokenQueSoloElServidorConoce1234567890
  expiration: 900000
  refrestToken: 86400000
